<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKH 2026 - Đăng nhập</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">

    <div class="login-wrapper">
        <div class="login-left">
            <p class="label">THÁNH KINH HÈ 2026</p>
            <h1>TKH System</h1>
            <p class="subtitle">
                Hệ thống điểm danh, điểm số và Bible Challenge.
            </p>
        </div>

        <div class="login-card">
            <h2>Đăng nhập</h2>
            <p class="hint">Vui lòng đăng nhập bằng tài khoản TKH do Ban Tổ Chức cung cấp.</p>

            <label>Tên đăng nhập</label>
            <input type="text" id="username" placeholder="Ví dụ: tkh001">

            <label>Mật khẩu</label>
            <input type="password" id="password" placeholder="Nhập mật khẩu">

            <button onclick="loginDemo()">Đăng nhập</button>

            <p id="loginMessage"></p>
        </div>
    </div>

    <script src="js/app.js?v=3"></script>
</body>
</html>
