<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKH 2026 - Hồ sơ thành viên</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">

<aside class="sidebar">
    <h2>TKH 2026</h2>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰ Menu</button>

    <a href="dashboard.html">Tổng quan</a>
    <a href="attendance.html">Điểm danh</a>
    <a href="my-score.html">Điểm cá nhân</a>
    <a href="group-score.html">Điểm nhóm</a>
    <a href="schedule.html">Lịch học</a>
    <a href="student-directory.html" class="active">Hộp thư khích lệ</a>
    <a href="session-questions.html">Câu hỏi buổi học</a>
    <a href="study-materials.html">Kho tài liệu</a>
    <a href="admin-dashboard.html" class="admin-only">Trang Admin</a>
    <a href="change-password.html">Đổi mật khẩu</a>
    <a href="../TKH-Bible-Challenge/index.html">Bible Challenge</a>
</aside>

<main class="main-content">

    <div class="topbar">
        <div>
            <h1 id="profileName">Hồ sơ thành viên</h1>
            <p id="profileGroup">Nhóm:</p>
        </div>

        <button onclick="logoutDemo()">Đăng xuất</button>
    </div>

    <section class="profile-box">
        <div class="profile-avatar" id="profileAvatar">?</div>

        <h2 id="profileFullName">Tên thành viên</h2>
        <p id="profileUsername">Mã tài khoản</p>

        <div class="encourage-panel">
        <h3>💌 Gửi lời khích lệ</h3>

        <textarea
            id="encourageText"
            class="form-input question-textarea"
            placeholder="Viết một lời động viên hoặc khích lệ dành cho thành viên này..."
        ></textarea>

        <label class="checkbox-line">
            <input type="checkbox" id="anonymousEncourage">
            Gửi ẩn danh
        </label>

        <button class="profile-btn" onclick="sendEncouragementDemo()">
            Gửi lời khích lệ
        </button>

        <p id="encourageMessage"></p>

        <hr class="section-divider">

        <h3>💌 Những lời khích lệ đã nhận</h3>

        <div id="encouragementList">
            <p class="empty-note">
                Chưa có lời khích lệ nào.
            </p>
        </div>
        </div>
    </section>

</main>

<script src="js/app.js?v=53"></script>

</body>
</html>
