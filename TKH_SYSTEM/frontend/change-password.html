<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKH 2026 - Đổi mật khẩu</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-page">

    <aside class="sidebar">
        <h2>TKH 2026</h2>
        <button class="mobile-menu-btn" onclick="toggleMobileMenu()">☰ Menu</button>
        <a href="dashboard.html">Tổng quan</a>
        <a href="attendance.html">Điểm danh</a>
        <a href="my-score.html">Điểm cá nhân</a>
        <a href="group-score.html">Điểm nhóm</a>
        <a href="schedule.html">Lịch học</a>
        <a href="student-directory.html">Hộp thư khích lệ</a>
        <a href="session-questions.html">Câu hỏi buổi học</a>
        <a href="study-materials.html">Kho tài liệu</a>
        <a href="admin-dashboard.html" class="admin-only">Trang Admin</a>
        <a href="change-password.html" class="active">Đổi mật khẩu</a>
        
        <hr class="sidebar-divider">

        <a href="#" onclick="confirmLogout(event)" class="logout-menu">
            ⏻ Đăng xuất
        </a>
    </aside>

    <main class="main-content">

        <div class="topbar">
            <div>
                <h1>Đổi mật khẩu</h1>
                <p>Cập nhật mật khẩu tài khoản TKH của bạn.</p>
            </div>

            
        </div>

        <section class="attendance-box password-box">
            <h2>Thông tin mật khẩu</h2>

            <label>Mật khẩu hiện tại</label>
            <input type="password" id="currentPassword" placeholder="Nhập mật khẩu hiện tại">

            <label>Mật khẩu mới</label>
            <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới">

            <label>Xác nhận mật khẩu mới</label>
            <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu mới">

            <button class="checkin-btn" onclick="changePasswordDemo()">
                Cập nhật mật khẩu
            </button>

            <p id="passwordMessage"></p>
        </section>

    </main>
    <div id="logoutModal" class="modal-overlay hidden">
        <div class="modal-box">
                <h3>⏻ Đăng xuất</h3>
                <p>Bạn có chắc chắn muốn đăng xuất khỏi hệ thống không?</p>

                <div class="modal-actions">
                    <button class="btn-secondary" onclick="closeLogoutModal()">Hủy</button>
                    <button class="btn-danger" onclick="logoutDemo()">Đăng xuất</button>
                </div>
        </div>
    </div>
    <script src="js/app.js?v=136"></script>

</body>
</html>
